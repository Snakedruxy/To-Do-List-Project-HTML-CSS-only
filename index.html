<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="to-do-list-wrap">
      <h1>To-Do List</h1>
      <p>These are the tasks you should do in the next 2 days</p>
    </section>


    <form id="todo-form">

      <section class="day-1">
        <h2>Monday</h2>
        <ul>
          <li>
            <label for="breakfast"><input type="checkbox" id="breakfast"> Eat Breakfast</label>
            <ul class="sub-item">
              <li><a class="sub-link" href="#" target="_blank">Wash the dishes</a></li>
            </ul>
          </li>
          <li>
            <label for="work"><input type="checkbox" id="work"> Go to Work</label>
            <ul class="sub-item">
              <li><a class="sub-link" href="#" target="_blank">Fill files</a></li>
            </ul>
          </li>
          <li>
            <label for="lunch"><input type="checkbox" id="lunch"> Eat Lunch</label>
            <ul class="sub-item">
              <li><a class="sub-link" href="#" target="_blank">Prepare dessert</a></li>
            </ul>
          </li>
          <li>
            <label for="dinner"><input type="checkbox" id="dinner"> Eat Dinner</label>
            <ul class="sub-item">
              <li><a class="sub-link" href="#" target="_blank">Eat fruit</a></li>
            </ul>
          </li>
        </ul>
      </section>

   
      <section class="day-2">
        <h2>Tuesday</h2>
        <ul>
          <li>
            <label for="breakfast-2"><input type="checkbox" id="breakfast-2"> Eat Breakfast</label>
            <ul class="sub-item">
              <li><a class="sub-link" href="#" target="_blank">Wash the dishes</a></li>
            </ul>
          </li>
          <li>
            <label for="work-2"><input type="checkbox" id="work-2"> Go to Work</label>
            <ul class="sub-item">
              <li><a class="sub-link" href="#" target="_blank">Join the meeting</a></li>
            </ul>
          </li>
          <li>
            <label for="book"><input type="checkbox" id="book"> Read Books</label>
            <ul class="sub-item">
              <li><a class="sub-link" href="#" target="_blank">Study math</a></li>
            </ul>
          </li>
          <li>
            <label for="exercise"><input type="checkbox" id="exercise"> Do Exercise</label>
            <ul class="sub-item">
              <li><a class="sub-link" href="#" target="_blank">Do pull-ups</a></li>
            </ul>
          </li>
        </ul>
      </section>

      <section class="bellow">
        <button type="submit" class="button">Submit</button>
      </section>
    </form>
  </main>

  <script>
    const form = document.getElementById('todo-form');

    form.addEventListener('submit', function(e) {
      e.preventDefault(); // prevents page reload


      const checkboxes = form.querySelectorAll('input[type="checkbox"]');
      const checkedTasks = [];

      checkboxes.forEach(checkbox => {
        if (checkbox.checked) {
          const label = checkbox.parentElement.textContent.trim();
          checkedTasks.push(label);
        }
      });

      if (checkedTasks.length > 0) {
        alert('Submitted!\nCompleted tasks:\n- ' + checkedTasks.join('\n- '));
      } else {
        alert('Submitted!\nNo tasks were selected.');
      }
    });
  </script>
</body>
</html>
